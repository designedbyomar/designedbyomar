<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>designedbyomar — Loader</title>

  <!--
  ┌─────────────────────────────────────────────────────────┐
  │  EMBED INSTRUCTIONS                                     │
  │                                                         │
  │  1. Copy the <style> block and .logo-loader div         │
  │  2. Drop into your page — background is transparent     │
  │  3. Color is driven by --loader-color CSS variable:     │
  │                                                         │
  │     Dark bg  →  --loader-color: #fff  (default)         │
  │     Light bg →  --loader-color: #000                   │
  │                                                         │
  │  4. Automatic via prefers-color-scheme, or override:    │
  │     <html data-theme="dark">  or  data-theme="light"   │
  └─────────────────────────────────────────────────────────┘
  -->

  <style>
    /* ── Page shell (demo only — remove for production) ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      transition: background 0.3s ease;
    }

    /* Demo toggle (remove for production) */
    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 8px;
      z-index: 10;
    }

    .theme-toggle button {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid currentColor;
      background: transparent;
      font-size: 11px;
      font-family: system-ui, sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    /* ── Color tokens — the only things that change ── */
    :root {
      --loader-color: #ffffff;
      --demo-bg:      #000000;
      --demo-fg:      #ffffff;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --loader-color: #000000;
        --demo-bg:      #ffffff;
        --demo-fg:      #000000;
      }
    }

    /* Manual override takes precedence */
    [data-theme="dark"]  {
      --loader-color: #ffffff;
      --demo-bg:      #000000;
      --demo-fg:      #ffffff;
    }
    [data-theme="light"] {
      --loader-color: #000000;
      --demo-bg:      #ffffff;
      --demo-fg:      #000000;
    }

    body { background: var(--demo-bg); }

    .theme-toggle button {
      color: var(--demo-fg);
    }
    .theme-toggle button:hover {
      background: var(--demo-fg);
      color: var(--demo-bg);
    }

    /* ═══════════════════════════════════════════════════════
       LOADER COMPONENT — copy everything below for embed
    ═══════════════════════════════════════════════════════ */

    .logo-loader {
      width: 430px;
      height: 90px;
      /* clips shapes that drop below the ground,
         polygon extends far above so bounces are never clipped */
      clip-path: polygon(-100% -10000%, 200% -10000%, 200% 100%, -100% 100%);
    }

    .logo-loader svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .logo-loader path {
      transform-box: fill-box;
      transform-origin: bottom center;
      fill: var(--loader-color, currentColor);
      transition: fill 0.3s ease;
    }

    /* ── Animation assignments ──
       All share 4000ms so the collective hold syncs perfectly.
       Different bounce rates come from different keyframe spacing. */
    #shape-circle   { animation: bounce-circle   4000ms linear 0ms infinite; }
    #shape-rect     { animation: bounce-rect     4000ms linear 0ms infinite; }
    #shape-triangle { animation: bounce-triangle 4000ms linear 0ms infinite; }
    #shape-d        { animation: bounce-d        4000ms linear 0ms infinite; }

    /*
      Bounce easing per segment:
      LAUNCH → peak:   ease-out cubic  (exits ground fast, decelerates)
      FALL   → ground: ease-in  cubic  (leaves peak slow, accelerates)

      Timeline:
        0%  – 72%  each shape bounces at its own pace
        72% – 85%  ALL shapes at ground together (~520ms hold)
        85% – 96%  all drop below ground
        96% – 100% brief pause before restart
    */

    /* ---- Circle: lightest — 4 bounces, most elastic
           Peak heights: 200% → 88% → 34% → 10%  ---- */
    @keyframes bounce-circle {
      0%     { transform: translateY(110%);
                animation-timing-function: cubic-bezier(0.215, 0.61, 0.355, 1); }
      8%     { transform: translateY(-200%);
                animation-timing-function: cubic-bezier(0.755, 0.05, 0.855, 0.06); }
      16%    { transform: translateY(0%);
                animation-timing-function: cubic-bezier(0.215, 0.61, 0.355, 1); }
      22%    { transform: translateY(-88%);
                animation-timing-function: cubic-bezier(0.755, 0.05, 0.855, 0.06); }
      28%    { transform: translateY(0%);
                animation-timing-function: cubic-bezier(0.215, 0.61, 0.355, 1); }
      33%    { transform: translateY(-34%);
                animation-timing-function: cubic-bezier(0.755, 0.05, 0.855, 0.06); }
      38%    { transform: translateY(0%);
                animation-timing-function: cubic-bezier(0.215, 0.61, 0.355, 1); }
      41.5%  { transform: translateY(-10%);
                animation-timing-function: cubic-bezier(0.755, 0.05, 0.855, 0.06); }
      45%    { transform: translateY(0%); }
      72%    { transform: translateY(0%);
                animation-timing-function: cubic-bezier(0.755, 0.05, 0.855, 0.06); }
      85%    { transform: translateY(0%); }
      96%    { transform: translateY(110%); }
      100%   { transform: translateY(110%); }
    }

    /* ---- Rectangle: medium — 3 bounces
           Peak heights: 155% → 60% → 20%  ---- */
    @keyframes bounce-rect {
      0%     { transform: translateY(110%);
                animation-timing-function: cubic-bezier(0.215, 0.61, 0.355, 1); }
      9%     { transform: translateY(-155%);
                animation-timing-function: cubic-bezier(0.755, 0.05, 0.855, 0.06); }
      18%    { transform: translateY(0%);
                animation-timing-function: cubic-bezier(0.215, 0.61, 0.355, 1); }
      25%    { transform: translateY(-60%);
                animation-timing-function: cubic-bezier(0.755, 0.05, 0.855, 0.06); }
      32%    { transform: translateY(0%);
                animation-timing-function: cubic-bezier(0.215, 0.61, 0.355, 1); }
      37.5%  { transform: translateY(-20%);
                animation-timing-function: cubic-bezier(0.755, 0.05, 0.855, 0.06); }
      43%    { transform: translateY(0%); }
      72%    { transform: translateY(0%);
                animation-timing-function: cubic-bezier(0.755, 0.05, 0.855, 0.06); }
      85%    { transform: translateY(0%); }
      96%    { transform: translateY(110%); }
      100%   { transform: translateY(110%); }
    }

    /* ---- Triangle: medium-light — 3 bounces, longer air time
           Peak heights: 178% → 72% → 26%  ---- */
    @keyframes bounce-triangle {
      0%     { transform: translateY(110%);
                animation-timing-function: cubic-bezier(0.215, 0.61, 0.355, 1); }
      10%    { transform: translateY(-178%);
                animation-timing-function: cubic-bezier(0.755, 0.05, 0.855, 0.06); }
      21%    { transform: translateY(0%);
                animation-timing-function: cubic-bezier(0.215, 0.61, 0.355, 1); }
      29%    { transform: translateY(-72%);
                animation-timing-function: cubic-bezier(0.755, 0.05, 0.855, 0.06); }
      37%    { transform: translateY(0%);
                animation-timing-function: cubic-bezier(0.215, 0.61, 0.355, 1); }
      43%    { transform: translateY(-26%);
                animation-timing-function: cubic-bezier(0.755, 0.05, 0.855, 0.06); }
      49%    { transform: translateY(0%); }
      72%    { transform: translateY(0%);
                animation-timing-function: cubic-bezier(0.755, 0.05, 0.855, 0.06); }
      85%    { transform: translateY(0%); }
      96%    { transform: translateY(110%); }
      100%   { transform: translateY(110%); }
    }

    /* ---- D-shape: heaviest — 2.5 bounces, lowest peaks, last to settle
           Peak heights: 115% → 42% → 12%  ---- */
    @keyframes bounce-d {
      0%     { transform: translateY(110%);
                animation-timing-function: cubic-bezier(0.215, 0.61, 0.355, 1); }
      12%    { transform: translateY(-115%);
                animation-timing-function: cubic-bezier(0.755, 0.05, 0.855, 0.06); }
      24%    { transform: translateY(0%);
                animation-timing-function: cubic-bezier(0.215, 0.61, 0.355, 1); }
      33.5%  { transform: translateY(-42%);
                animation-timing-function: cubic-bezier(0.755, 0.05, 0.855, 0.06); }
      43%    { transform: translateY(0%);
                animation-timing-function: cubic-bezier(0.215, 0.61, 0.355, 1); }
      50%    { transform: translateY(-12%);
                animation-timing-function: cubic-bezier(0.755, 0.05, 0.855, 0.06); }
      57%    { transform: translateY(0%); }
      72%    { transform: translateY(0%);
                animation-timing-function: cubic-bezier(0.755, 0.05, 0.855, 0.06); }
      85%    { transform: translateY(0%); }
      96%    { transform: translateY(110%); }
      100%   { transform: translateY(110%); }
    }

    /* ═══════════════════════════════════════════════════════
       END LOADER COMPONENT
    ═══════════════════════════════════════════════════════ */

    @media (prefers-reduced-motion: reduce) {
      .logo-loader path { animation: none; transform: translateY(0%); }
    }
  </style>
</head>
<body>

  <!-- Demo toggle — remove for production -->
  <div class="theme-toggle">
    <button onclick="document.documentElement.dataset.theme='dark'">Dark</button>
    <button onclick="document.documentElement.dataset.theme='light'">Light</button>
  </div>

  <!-- ═══ LOADER COMPONENT — copy this div for embed ═══ -->
  <div class="logo-loader">
    <svg width="86" height="18" viewBox="0 0 86 18"
         fill="none" xmlns="http://www.w3.org/2000/svg" overflow="visible">
      <path id="shape-circle"
            d="M9.21429 18C14.3032 18 18.4286 13.9706 18.4286 9C18.4286 4.02944 14.3032 0 9.21429 0C4.12538 0 0 4.02944 0 9C0 13.9706 4.12538 18 9.21429 18Z"/>
      <path id="shape-rect"
            d="M39.9286 0H21.5V18H39.9286V0Z"/>
      <path id="shape-triangle"
            d="M53.75 0L64.5 18H43L53.75 0Z"/>
      <path id="shape-d"
            d="M66.0357 0H72.4643C79.0917 0 84.4643 5.37258 84.4643 12V18H72.0357C68.722 18 66.0357 15.3137 66.0357 12V0Z"/>
    </svg>
  </div>
  <!-- ═══ END LOADER COMPONENT ═══ -->

  <script>
    // Sync initial theme to system preference if no override set
    const mq = window.matchMedia('(prefers-color-scheme: light)');
    if (!document.documentElement.dataset.theme) {
      document.documentElement.dataset.theme = mq.matches ? 'light' : 'dark';
    }
    mq.addEventListener('change', e => {
      document.documentElement.dataset.theme = e.matches ? 'light' : 'dark';
    });
  </script>
</body>
</html>
