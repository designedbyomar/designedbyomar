:root {
  --bg-page: #0a0a0a;
  --bg-subtle: #1a1a1a;

  --font-sans: 'Geist', Arial, sans-serif;
  --font-mono: 'Geist Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  min-height: 100%;
  background: var(--bg-page);
  color: var(--fg-primary);
  font-family: var(--font-sans);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.page-header {
  padding: 24px 32px;
  display: flex;
  align-items: center;
}
.page-header a {
  display: inline-flex;
  text-decoration: none;
  color: var(--fg-primary);
}
.page-main {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px 24px 64px;
}
.shell {
  width: 100%;
  max-width: 720px;
  text-align: center;
}
.eyebrow {
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--fg-tertiary);
  margin-bottom: 32px;
}
.eyebrow .code { color: var(--color-develop-blue); }

.scene {
  position: relative;
  height: 180px;
  margin: 0 auto 32px;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}
.scene .ufo {
  position: absolute;
  top: 12px;
  left: 50%;
  transform: translateX(-260%);
  opacity: 0;
  width: 88px;
  animation: ufo-arrive 1.2s cubic-bezier(.2,.7,.2,1) 0.2s forwards,
             ufo-leave 1.0s cubic-bezier(.6,.0,.7,.3) 3.2s forwards;
}
.scene .beam {
  position: absolute;
  top: 56px;
  left: 50%;
  width: 64px;
  height: 96px;
  transform: translateX(-50%) scaleY(0);
  transform-origin: top center;
  opacity: 0;
  background: linear-gradient(180deg,
    color-mix(in oklab, var(--color-preview-pink) 70%, transparent),
    color-mix(in oklab, var(--color-preview-pink) 8%, transparent));
  clip-path: polygon(30% 0%, 70% 0%, 100% 100%, 0% 100%);
  mix-blend-mode: screen;
  animation: beam-pulse 1.4s ease-in-out 1.4s forwards;
}
.scene .alien {
  position: absolute;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  opacity: 0;
  width: 64px;
  animation: alien-land 0.6s cubic-bezier(.2,.9,.3,1.4) 2.0s both;
}
@keyframes ufo-arrive {
  from { transform: translateX(-260%); opacity: 0; }
  to   { transform: translateX(-50%);  opacity: 1; }
}
@keyframes ufo-leave {
  from { transform: translateX(-50%);  opacity: 1; }
  to   { transform: translateX(280%);  opacity: 0; }
}
@keyframes beam-pulse {
  0%   { transform: translateX(-50%) scaleY(0); opacity: 0; }
  25%  { transform: translateX(-50%) scaleY(1); opacity: 0.85; }
  75%  { transform: translateX(-50%) scaleY(1); opacity: 0.55; }
  100% { transform: translateX(-50%) scaleY(0); opacity: 0; }
}
@keyframes alien-land {
  0%   { opacity: 0; transform: translateX(-50%) translateY(-40px) scale(0.5); }
  60%  { opacity: 1; transform: translateX(-50%) translateY(4px)  scale(1.05); }
  100% { opacity: 1; transform: translateX(-50%) translateY(0)    scale(1); }
}
@media (prefers-reduced-motion: reduce) {
  .scene .ufo, .scene .beam, .scene .alien { animation: none; opacity: 1; transform: translateX(-50%); }
  .scene .beam { transform: translateX(-50%) scaleY(1); opacity: 0.4; }
}

h1 {
  font-size: clamp(36px, 6.5vw, 64px);
  line-height: 1.0;
  letter-spacing: -0.04em;
  margin-bottom: 16px;
}
p {
  max-width: 520px;
  margin: 0 auto 32px;
  font-size: clamp(16px, 1.8vw, 18px);
  line-height: 1.6;
  color: var(--fg-secondary);
}
.actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: center;
}
.button,
.button-secondary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 11px 18px;
  border-radius: 6px;
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: opacity 150ms ease;
}
.button {
  background: var(--fg-primary);
  color: var(--bg-page);
}
.button-secondary {
  color: var(--fg-primary);
  box-shadow: inset 0 0 0 1px var(--color-gray-100);
}
.button:hover,
.button-secondary:hover { opacity: 0.85; }

@media (max-width: 540px) {
  .page-header { padding: 20px 20px; }
  .scene { height: 160px; margin-bottom: 24px; }
  .scene .ufo { width: 72px; }
  .scene .alien { width: 56px; }
  .actions { flex-direction: column; align-items: stretch; }
  .button, .button-secondary { justify-content: center; }
}
