<style>
/* RESET */
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg-page);
  color: var(--fg-primary);
  font-family: var(--font-sans);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  font-feature-settings: "liga" 1;
  scroll-behavior: smooth;
  min-height: 100vh;
}
body { transition: background 320ms ease, color 320ms ease; }
a { color: inherit; }
::selection { background: var(--fg-primary); color: var(--bg-page); }

.text-link {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  width: fit-content;
  font-family: inherit;
  font-size: var(--font-size-body-md);
  font-weight: var(--font-weight-medium);
  line-height: var(--line-height-medium);
  color: var(--fg-secondary);
  background: none;
  border: none;
  padding: 0;
  cursor: pointer;
  text-decoration: none;
  transition: color var(--duration-fast-mid) ease, transform var(--duration-fast-mid) ease;
}
.text-link:hover {
  color: var(--fg-primary);
  transform: translateX(4px);
}
.faq-view-all-link {
  align-self: flex-start;
}

/* Typography Globals */
.tnum { font-feature-settings: "tnum" 1, "liga" 1; }

.section-head {
  border-bottom: 1px solid var(--fg-primary);
  padding-bottom: 16px;
  margin-bottom: 64px;
}

.mono-label {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--fg-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 24px;
}

.copy-button {
  opacity: 0;
  transition: opacity 150ms;
}
.swatch:hover .copy-button {
  opacity: 1;
}

/* Contact card animated border */
@property --contact-angle {
  syntax: '<angle>';
  inherits: false;
  initial-value: 0deg;
}
@keyframes contact-border-spin {
  to { --contact-angle: 360deg; }
}
.contact-card {
  position: relative;
}
.contact-card::before {
  content: '';
  position: absolute;
  inset: -1.5px;
  border-radius: 9.5px;
  background: conic-gradient(
    from var(--contact-angle),
    var(--color-ship-red),
    var(--color-preview-pink),
    var(--color-develop-blue),
    var(--color-ship-red)
  );
  opacity: 0;
  transition: opacity 300ms ease;
  animation: contact-border-spin 3s linear infinite;
  z-index: 0;
}
.contact-card::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 8px;
  background: var(--bg-page);
  z-index: 1;
}
.contact-card > span {
  position: relative;
  z-index: 2;
}
.contact-card:hover::before { opacity: 1; }

.faq-item {
  position: relative;
  isolation: isolate;
  background: var(--bg-page);
  transition: background 180ms ease, transform 180ms ease, box-shadow 180ms ease;
}
.faq-item:hover,
.faq-item.is-open {
  background: var(--bg-subtle);
}
.faq-item:hover {
  transform: translateY(-1px);
}

@media (prefers-reduced-motion: reduce) {
  .contact-card::before {
    animation: none !important;
  }
  .faq-item,
  .faq-answer,
  .faq-item svg,
  .text-link {
    transition: none !important;
  }
  .faq-item:hover {
    transform: none;
  }
  .text-link:hover {
    transform: none;
  }
}

</style>
